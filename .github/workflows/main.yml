##############################################################################
# GitHub Actions CI – local_stackmatheditor
#
# Matrix:
#   Moodle: MOODLE_405_STABLE, MOODLE_500_STABLE
#   PHP:    8.2, 8.3
#   DB:     MariaDB 10.6 (job phpunit-mariadb)
#           PostgreSQL 14  (job phpunit-pgsql)
#
# External dependencies:
#   qtype_stack  MOODLE_405_STABLE → STACK 4.6+, requires Maxima ≥ 5.46
#   Maxima 5.46+ via apt           → version assertion enforced
#   gnuplot                        → required by STACK plot rendering
##############################################################################

name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - master
      - 'MOODLE_*'
  pull_request:
    branches:
      - main
      - master

jobs:

  # ── 1a. PHP Lint – CodeSniffer, CPD, Mess Detector ─────────────────────────
  lint-php:
    name: "PHP Lint – PHP ${{ matrix.php }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      # PHP CodeSniffer checks against the Moodle coding style standard.
      # This covers: indentation, line length, docblock format, naming
      # conventions, and Moodle-specific rules (e.g. no direct $_GET access).
      - name: PHP CodeSniffer (Moodle coding style)
        run: moodle-plugin-ci phpcs plugin

      # Detects copy-pasted code blocks that should be refactored.
      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd plugin || true

      # Static analysis: detects overly complex methods, unused parameters etc.
      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd plugin || true

  # ── 1b. JavaScript + CSS Lint ────────────────────────────────────────────
  # Requires a Moodle install for grunt config resolution, but no DB.
  # Runs on one PHP version only — JS/CSS style doesn't vary with PHP.
  lint-js:
    name: "JS/CSS Lint"
    runs-on: ubuntu-22.04

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Set up Node.js (for grunt / eslint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack as a dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_405_STABLE \
            maths/moodle-qtype_stack

      # A minimal Moodle install is needed so grunt can resolve the shared
      # .eslintrc and .stylelintrc from the Moodle root.
      - name: Install Moodle (for grunt config)
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            mysqli \
            --moodle-branch MOODLE_405_STABLE
        env:
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Install Node dependencies (grunt, eslint, stylelint)
        run: npm install
        working-directory: ${{ github.workspace }}/moodle

      # moodle-plugin-ci grunt runs: grunt eslint stylelint
      # This validates all amd/src/*.js against Moodle's ESLint ruleset
      # and styles.css against Moodle's stylelint ruleset.
      - name: ESLint – AMD JavaScript source files
        run: moodle-plugin-ci grunt --plugin ./plugin eslint
        continue-on-error: false

      - name: Stylelint – CSS
        run: moodle-plugin-ci grunt --plugin ./plugin stylelint
        continue-on-error: true   # warn only until baseline is established

      # Verify every amd/src/*.js has a matching amd/build/*.min.js.
      # This catches forgotten grunt builds before a release.
      - name: Verify AMD build artefacts are present
        run: |
          MISSING=0
          for src in plugin/amd/src/*.js; do
            [ -f "$src" ] || continue
            base=$(basename "$src" .js)
            min="plugin/amd/build/${base}.min.js"
            if [ ! -f "$min" ]; then
              echo "MISSING: amd/build/${base}.min.js (source: amd/src/${base}.js)"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING AMD build file(s) missing. Run grunt amd."
            exit 1
          fi
          echo "AMD build check: all $( ls plugin/amd/src/*.js | wc -l ) files have a build artefact."

  # Downstream jobs wait for both lint jobs.
  # Rename 'lint' references in needs: to use the new job names.

  # ── Helper: shared step blocks (referenced via YAML anchors) ───────────────
  # GHA does not support top-level anchors — steps are repeated per job.
  # Common logic is extracted into scripts called via run: |

  # ── 2. PHPUnit – MariaDB ───────────────────────────────────────────────────
  phpunit-mariadb:
    name: "PHPUnit (${{ matrix.moodle }} / PHP ${{ matrix.php }} / MariaDB)"
    runs-on: ubuntu-22.04
    needs: [lint-php, lint-js]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']
        php:    ['8.2', '8.3']

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima version OK: {v}')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack as a dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            mysqli \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK to use local Maxima
        run: |
          M="$GITHUB_WORKSPACE/moodle"
          B=$(which maxima)
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximaversion     --set=5.46
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=castimeout         --set=30
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommand      --set="$B"
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommandopt   --set=""
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=stackmaximaversion --set=2024010400
          echo "STACK Maxima settings applied."

      - name: Initialise PHPUnit
        run: php admin/tool/phpunit/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      # moodle-plugin-ci phpunit auto-discovers tests via phpunit.xml in the
      # plugin root. No --testsuite flag needed.
      - name: PHPUnit – all tests (no-DB + DB groups)
        run: moodle-plugin-ci phpunit --plugin ./plugin

      # Run DB-tagged group explicitly so failures are visible separately.
      - name: PHPUnit – DB integration group only
        run: |
          moodle-plugin-ci phpunit --plugin ./plugin \
            -- --group local_stackmatheditor_db

  # ── 3. PHPUnit – PostgreSQL ────────────────────────────────────────────────
  phpunit-pgsql:
    name: "PHPUnit (${{ matrix.moodle }} / PHP ${{ matrix.php }} / PostgreSQL)"
    runs-on: ubuntu-22.04
    needs: [lint-php, lint-js]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']
        php:    ['8.2', '8.3']

    services:
      pgsql:
        image: postgres:14
        env:
          POSTGRES_USER:     moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB:       moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U moodle"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_pgsql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima version OK: {v}')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack as a dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            pgsql \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     pgsql
          DBHOST: 127.0.0.1
          DBPORT: 5432
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK to use local Maxima
        run: |
          M="$GITHUB_WORKSPACE/moodle"
          B=$(which maxima)
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximaversion     --set=5.46
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=castimeout         --set=30
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommand      --set="$B"
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommandopt   --set=""
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=stackmaximaversion --set=2024010400

      - name: Initialise PHPUnit
        run: php admin/tool/phpunit/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: PHPUnit – all tests
        run: moodle-plugin-ci phpunit --plugin ./plugin

      - name: PHPUnit – DB integration group only
        run: |
          moodle-plugin-ci phpunit --plugin ./plugin \
            -- --group local_stackmatheditor_db

  # ── 4. Behat – browser tests ──────────────────────────────────────────────
  behat:
    name: "Behat (${{ matrix.moodle }} / PHP 8.2 / Chrome)"
    runs-on: ubuntu-22.04
    needs: [phpunit-mariadb, phpunit-pgsql]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: >-
          --shm-size=2g
          --health-cmd="curl -sf http://localhost:4444/wd/hub/status"
          --health-interval=15s
          --health-retries=5
        ports:
          - 4444:4444

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack as a dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            mysqli \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK Maxima
        run: |
          M="$GITHUB_WORKSPACE/moodle"
          B=$(which maxima)
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximaversion  --set=5.46
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=castimeout      --set=30
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommand   --set="$B"

      - name: Initialise Behat
        run: php admin/tool/behat/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      # Behat feature paths are relative to the Moodle root.
      # The plugin is installed at local/stackmatheditor/ by moodle-plugin-ci.
      - name: Behat – toolbar configuration
        run: |
          moodle-plugin-ci behat --plugin ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/configure_toolbar.feature"

      - name: Behat – editor rendering and pre-fill
        run: |
          moodle-plugin-ci behat --plugin ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/editor_rendering.feature"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots-${{ matrix.moodle }}
          path: ${{ github.workspace }}/moodle/behatfaildumps/
          retention-days: 7
