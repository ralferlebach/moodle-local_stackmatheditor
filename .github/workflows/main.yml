##############################################################################
# GitHub Actions CI – local_stackmatheditor
#
# Matrix coverage:
#   Moodle:   MOODLE_45_STABLE, MOODLE_500_STABLE
#   PHP:      8.2, 8.3
#   Database: MariaDB 10.6, PostgreSQL 14
#
# External dependencies installed in every job:
#   qtype_stack  – MOODLE_45_STABLE branch (≙ STACK 4.6+, Maxima ≥ 5.46)
#   Maxima 5.46+ – via apt; version assertion fails the build if too old
#   gnuplot      – required by STACK for plot rendering
#
# Jobs:
#   lint     – phpcs / phpcpd / amd-source-check  (no DB, fast)
#   phpunit  – unit + DB integration tests         (mariadb + pgsql)
#   behat    – browser scenarios via Selenium      (mariadb only, slow)
##############################################################################

name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - master
      - 'MOODLE_*'
  pull_request:
    branches:
      - main
      - master

jobs:

  # ── 1. Lint – coding style, no DB required ─────────────────────────────────
  lint:
    name: "Lint – PHP ${{ matrix.php }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: PHP CodeSniffer (Moodle coding style)
        run: moodle-plugin-ci phpcs plugin

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd plugin || true

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd plugin || true

      - name: Verify AMD build artefacts are current
        run: |
          for min in plugin/amd/build/*.min.js; do
            [ -f "$min" ] || continue
            base=$(basename "$min" .min.js)
            src="plugin/amd/src/${base}.js"
            if [ ! -f "$src" ]; then
              echo "ERROR: $min has no matching source in amd/src/"
              exit 1
            fi
          done
          echo "AMD build check passed."

  # ── 2. PHPUnit – MariaDB ───────────────────────────────────────────────────
  phpunit-mariadb:
    name: "PHPUnit – ${{ matrix.moodle }} / PHP ${{ matrix.php }} / MariaDB"
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']
        php:    ['8.2', '8.3']

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          MAXIMA_VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Maxima version: $MAXIMA_VER"
          python3 -c "
          ver = tuple(int(x) for x in '${MAXIMA_VER}'.split('.'))
          req = (5, 46)
          assert ver >= req, f'Maxima {ver} < required {req}'
          print(f'Maxima {ver} >= {req}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      # Install qtype_stack (STACK 4.6+) before moodle-plugin-ci install
      - name: Add qtype_stack dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            mysqli \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK to use local Maxima
        run: |
          MOODLE="$GITHUB_WORKSPACE/moodle"
          MAXIMA_BIN=$(which maxima)
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximaversion    --set=5.46
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=castimeout        --set=30
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximacommand     --set="$MAXIMA_BIN"
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximacommandopt  --set=""
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=stackmaximaversion --set=2024010400
          echo "STACK configured."

      - name: Initialise PHPUnit test DB
        run: php admin/tool/phpunit/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: PHPUnit – unit tests (no DB)
        run: moodle-plugin-ci phpunit --plugin ./plugin --testsuit local_stackmatheditor

      - name: PHPUnit – DB integration tests
        run: |
          moodle-plugin-ci phpunit \
            --plugin      ./plugin \
            --testsuit    local_stackmatheditor \
            --phpunit-option="--group=local_stackmatheditor_db"

  # ── 3. PHPUnit – PostgreSQL ────────────────────────────────────────────────
  phpunit-pgsql:
    name: "PHPUnit – ${{ matrix.moodle }} / PHP ${{ matrix.php }} / PostgreSQL"
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']
        php:    ['8.2', '8.3']

    services:
      pgsql:
        image: postgres:14
        env:
          POSTGRES_USER:     moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB:       moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U moodle"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_pgsql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          MAXIMA_VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Maxima version: $MAXIMA_VER"
          python3 -c "
          ver = tuple(int(x) for x in '${MAXIMA_VER}'.split('.'))
          assert ver >= (5, 46), f'Maxima {ver} < required (5, 46)'
          print(f'Maxima {ver}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Add qtype_stack dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            pgsql \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     pgsql
          DBHOST: 127.0.0.1
          DBPORT: 5432
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK Maxima
        run: |
          MOODLE="$GITHUB_WORKSPACE/moodle"
          MAXIMA_BIN=$(which maxima)
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximaversion    --set=5.46
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=castimeout        --set=30
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximacommand     --set="$MAXIMA_BIN"
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximacommandopt  --set=""
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=stackmaximaversion --set=2024010400

      - name: Initialise PHPUnit test DB
        run: php admin/tool/phpunit/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: PHPUnit – unit tests (no DB)
        run: moodle-plugin-ci phpunit --plugin ./plugin --testsuit local_stackmatheditor

      - name: PHPUnit – DB integration tests
        run: |
          moodle-plugin-ci phpunit \
            --plugin      ./plugin \
            --testsuit    local_stackmatheditor \
            --phpunit-option="--group=local_stackmatheditor_db"

  # ── 4. Behat – browser tests (MariaDB, Chrome) ────────────────────────────
  behat:
    name: "Behat – ${{ matrix.moodle }} / PHP 8.2"
    runs-on: ubuntu-22.04
    needs: [phpunit-mariadb, phpunit-pgsql]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_45_STABLE', 'MOODLE_500_STABLE']

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: >-
          --shm-size=2g
          --health-cmd="curl -sf http://localhost:4444/wd/hub/status"
          --health-interval=15s
          --health-retries=5
        ports:
          - 4444:4444

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Add qtype_stack dependency
        run: |
          moodle-plugin-ci add-plugin \
            --branch MOODLE_45_STABLE \
            maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin        ./plugin \
            --db            mysqli \
            --moodle-branch ${{ matrix.moodle }}
        env:
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK Maxima
        run: |
          MOODLE="$GITHUB_WORKSPACE/moodle"
          MAXIMA_BIN=$(which maxima)
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximaversion    --set=5.46
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=castimeout        --set=30
          php "$MOODLE/admin/cli/cfg.php" \
            --component=qtype_stack --name=maximacommand     --set="$MAXIMA_BIN"

      - name: Initialise Behat
        run: php admin/tool/behat/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: Behat – toolbar configuration
        run: |
          moodle-plugin-ci behat \
            --plugin  ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/configure_toolbar.feature"

      - name: Behat – editor rendering & pre-fill
        run: |
          moodle-plugin-ci behat \
            --plugin  ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/editor_rendering.feature"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots-${{ matrix.moodle }}
          path: ${{ github.workspace }}/moodle/behatfaildumps/
          retention-days: 7
