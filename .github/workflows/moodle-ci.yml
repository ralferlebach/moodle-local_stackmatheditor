##############################################################################
# GitHub Actions CI – local_stackmatheditor
#
# Matrix:
#   Moodle: MOODLE_405_STABLE, MOODLE_500_STABLE, MOODLE_501_STABLE
#   PHP:    8.2, 8.3, 8.4  (8.4 nur für Moodle ≥ 5.1, siehe exclude)
#   DB:     MariaDB 10.11  |  PostgreSQL 16
#
# Abhängigkeiten:
#   qtype_stack  → branch master
#   Maxima ≥ 5.46 via apt + Versionscheck
#   gnuplot       → für STACK-Plot-Rendering
##############################################################################

name: Moodle Plugin CI

on:
  push:
  pull_request:

env:
  MOODLE_CI: '^4'   # moodle-plugin-ci Versionsconstraint (einmalig gepflegt)

jobs:

  # ── 1a. PHP Lint ──────────────────────────────────────────────────────────
  lint-php:
    name: "PHP Lint – ${{ matrix.php }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: PHP CodeSniffer (Moodle coding style)
        run: moodle-plugin-ci phpcs plugin

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd plugin || true

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd plugin || true

  # ── 1b. JS / CSS Lint ────────────────────────────────────────────────────
  # Benötigt eine minimale Moodle-Installation für grunt-Config-Auflösung,
  # aber keine DB-Matrix – JS/CSS-Stil variiert nicht mit PHP-Version.
  lint-js:
    name: "JS/CSS Lint"
    runs-on: ubuntu-24.04

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Install Moodle (grunt-Config)
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  mysqli \
            --moodle   MOODLE_405_STABLE
        env:
          TRAVIS_BRANCH: ${{ github.head_ref || github.ref_name }}
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Install Node dependencies
        run: npm install
        working-directory: ${{ github.workspace }}/moodle

      - name: ESLint – AMD JS
        run: moodle-plugin-ci grunt --plugin ./plugin eslint

      - name: Stylelint – CSS
        run: moodle-plugin-ci grunt --plugin ./plugin stylelint
        continue-on-error: true   # warn only until baseline is established

      - name: Verify AMD build artefacts
        run: |
          MISSING=0
          for src in plugin/amd/src/*.js; do
            [ -f "$src" ] || continue
            base=$(basename "$src" .js)
            [ -f "plugin/amd/build/${base}.min.js" ] || {
              echo "MISSING: amd/build/${base}.min.js"
              MISSING=$((MISSING+1))
            }
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING AMD build file(s) fehlen – 'grunt amd' ausführen."
            exit 1
          fi
          echo "AMD build OK: $(ls plugin/amd/src/*.js | wc -l) Datei(en) verifiziert."

  # ── 2. PHPUnit (MariaDB + PostgreSQL als Matrix-Dimension) ────────────────
  #
  # Beide DB-Services laufen pro Job (GHA unterstützt keine bedingten Services).
  # Es wird jeweils nur der zur Matrix passende Service genutzt – akzeptabler
  # Overhead als Tausch gegen eine einzige, wartbare Job-Definition.
  phpunit:
    name: "PHPUnit (${{ matrix.moodle }} / PHP ${{ matrix.php }} / ${{ matrix.db.engine }})"
    runs-on: ubuntu-24.04
    needs: [lint-php, lint-js]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_405_STABLE', 'MOODLE_500_STABLE', 'MOODLE_501_STABLE']
        php:    ['8.2', '8.3', '8.4']
        db:
          - { engine: mariadb, type: mysqli, port: 3306 }
          - { engine: pgsql,   type: pgsql,  port: 5432 }
        exclude:
          # PHP 8.4 wird erst ab Moodle 5.1 offiziell unterstützt
          - { moodle: MOODLE_405_STABLE, php: '8.4' }
          - { moodle: MOODLE_500_STABLE, php: '8.4' }

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      pgsql:
        image: postgres:16
        env:
          POSTGRES_USER:     moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB:       moodle
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U moodle"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
          ref: ${{ github.head_ref || github.ref_name }}

      # Beide DB-Treiber installieren – welcher aktiv ist, bestimmt die Matrix
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, pdo_pgsql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima {v}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  ${{ matrix.db.type }} \
            --moodle   ${{ matrix.moodle }}
        env:
          TRAVIS_BRANCH: ${{ github.head_ref || github.ref_name }}
          DB:     ${{ matrix.db.type }}
          DBHOST: 127.0.0.1
          DBPORT: ${{ matrix.db.port }}
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK (Maxima)
        run: |
          M="$GITHUB_WORKSPACE/moodle"
          B=$(which maxima)
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximaversion      --set="$VER"
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=castimeout         --set=30
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommand      --set="$B"
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommandopt   --set=""
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=stackmaximaversion --set=2024010400

      - name: Initialise PHPUnit
        run: php admin/tool/phpunit/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: PHPUnit – all tests
        run: moodle-plugin-ci phpunit --plugin ./plugin

      - name: PHPUnit – DB group
        run: |
          moodle-plugin-ci phpunit --plugin ./plugin \
            -- --group local_stackmatheditor_db

  # ── 3. Behat ──────────────────────────────────────────────────────────────
  behat:
    name: "Behat (${{ matrix.moodle }} / PHP 8.2 / Chrome)"
    runs-on: ubuntu-24.04
    needs: [phpunit]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_405_STABLE', 'MOODLE_500_STABLE', 'MOODLE_501_STABLE']

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: >-
          --shm-size=2g
          --health-cmd="curl -sf http://localhost:4444/wd/hub/status"
          --health-interval=15s
          --health-retries=5
        ports: ['4444:4444']

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      moodle
          MYSQL_USER:          moodle
          MYSQL_PASSWORD:      moodle
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          coverage: none

      - name: Install Maxima and gnuplot
        run: sudo apt-get update -qq && sudo apt-get install -y maxima gnuplot

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  mysqli \
            --moodle   ${{ matrix.moodle }}
        env:
          TRAVIS_BRANCH: ${{ github.head_ref || github.ref_name }}
          DB:     mysqli
          DBHOST: 127.0.0.1
          DBPORT: 3306
          DBUSER: moodle
          DBPASS: moodle
          DBNAME: moodle

      - name: Configure STACK (Maxima)
        run: |
          M="$GITHUB_WORKSPACE/moodle"
          B=$(which maxima)
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximaversion --set=5.46
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=castimeout    --set=30
          php "$M/admin/cli/cfg.php" --component=qtype_stack --name=maximacommand --set="$B"

      - name: Initialise Behat
        run: php admin/tool/behat/cli/init.php
        working-directory: ${{ github.workspace }}/moodle

      - name: Behat – toolbar configuration
        run: |
          moodle-plugin-ci behat --plugin ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/configure_toolbar.feature"

      - name: Behat – editor rendering
        run: |
          moodle-plugin-ci behat --plugin ./plugin \
            --profile chrome \
            --tags    "@local_stackmatheditor and not @broken" \
            --feature "local/stackmatheditor/tests/behat/editor_rendering.feature"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots-${{ matrix.moodle }}
          path: ${{ github.workspace }}/moodle/behatfaildumps/
          retention-days: 7
